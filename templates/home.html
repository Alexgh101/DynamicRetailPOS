<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elevate Retail</title>
    <style>
        /*background and font*/
    body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: #e8d8c3;
    }

    /*header*/
    header {
    background: #f7f7f7;
    color: black;
    padding: 20px;
    text-align: center;
    }

    .logo {
    max-width: 240px;
    height: auto;
    display: block;
    margin: 0 auto 10px;
    }
    .items-container {
        width: 90%;
        max-width: 1100px;
        margin: 30px auto;
        display: grid;
        gap: 25px;
        place-items: center;
        }

        /*box around items*/
        .items {
        background: #f9f9f9;
        padding: 20px;
        border-radius: 12px;
        border: 1px solid #d6d6d6;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        text-align: center;
        }

        /*cart item cards*/
        .item-card {
        display: flex;
        gap: 15px;
        flex-direction: column;
        align-items: center;
        text-align:center;
        padding: 15px;
        margin-bottom: 15px;
        background: white;
        border: 1px solid #dddddd;
        border-radius: 10px;
        }

        /*item images*/
        .item-card img {
        width: 100%;
        height: 140px;
        object-fit: cover;
        border-radius: 8px;
        }

        /*product info*/
        .item-details {
        flex: 1;
        }
        .item-details h3 {
        margin: 0 0 8px;
        font-size: 18px;
        }
        .item-details p {
        margin: 0 0 10px;
        color: #555;
        font-size: 14px;
        }

        /*price text*/
        .price {
        font-weight: bold;
        color: #187633;
        margin-bottom: 10px;
        }
    </style>
</head>
<body>
<header>
    <img src="{{ url_for('static', filename='elevate_retail_logo_4.png') }}" alt="Elevate Retail Logo" class="logo">
    <button onclick="window.location.href='cart';">My Cart</button>
</header>
<div class="items-container">
    <h2>Available Products</h2>
    <section class="items">
        {% if products %}
            {% for item in products %}
            <div class="item-card">
                <img src="{{ item.image }}" alt="{{ item.name }}">
                <div class="item-details">
                    <h3>{{ item.name }}</h3>
                    <p>{{item.description}}</p>
                    <p1>{{item.quantity}} in stock</p1>
                    <div class="price">${{ "%.2f"|format(item.price | float) }} each</div>
                    <form action="{{ url_for('add_to_cart') }}" method="POST">
                        <input type="hidden" name="name" value="{{ item.name }}">
                        <input type="hidden" name="description" value="{{ item.description }}">
                        <input type="hidden" name="price" value="{{ item.price }}">
                        <input type="hidden" name="image" value="{{ item.image }}">
                        <button type="submit">Add to Cart</button>
                    </form>
                </div>
            </div>
            {% endfor %}
        {% else %}
        <!--cart empty message-->
            <p class="empty-cart">Nothing is Available.</p>
        {% endif %}
    </section>
</div>
</body>
</html>
